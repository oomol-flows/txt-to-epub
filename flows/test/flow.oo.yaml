    title: "%txt-epub-1%"
    inputs_from:
      - handle: txt_file
        value: /oomol-driver/oomol-storage/book_source/qm.txt
      - handle: epub_file
        value:
      - handle: book_title
        value: null
      - handle: author
        value: null
      - handle: cover_image
        value: null
      - handle: enable_smart_toc
        value: null
      - handle: llm_confidence_threshold
        value: null
      - handle: llm_toc_detection_threshold
        value: null
      - handle: llm_no_toc_threshold
        value: null
      - handle: toc_detection_score_threshold
        value: null
      - handle: toc_max_scan_lines
        value: null
      - handle: enable_resume
        value: null
      - handle: llm
        value:
          model: oomol-chat
          temperature: 0.6
          top_p: 0.8
          max_tokens: 8100
      - handle: enable_ai_cover
        value:
      - handle: enable_ai_illustrations
        value:
    task: self::txt-to-epub
